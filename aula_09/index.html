<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Aula_09</title>

</head>
</body>
<h1>Formulario</h1>
<Form>
    <table border="1">
        <tr>
            <th><label for="nome">Nome:</label></th>
            <th><input type="text" id="nome" name="nome" placeholder="Digite seu nome."></th>
        </tr>
        <tr>
            <th><label for="email">E-mail:</label></th>
            <th><input type="email" id="email" name="E-mail"></th>
        </tr>
        <tr>
            <th><label for="email pessoal">E-mail Pessoal:</label></th>
            <th><input type="email" id="email pessoal" name="E-mail" placeholder="Digite seu E-mail."></th>
        </tr>
        <tr>
            <th><label for="senha">Senha:</label></th>
            <th><input type="password" id="senha" name="senha"></th>
        </tr>
        <tr>
            <th><label for="idade">Idade:</label></th>
            <th><input type="date" id="idade" name="idade"></th>
        </tr>
        <tr>
            <th colspan="2"><label for="comentario">
                    <h5>Deixe seu comentário</h5>
                    <textarea id="comentario" name="comentario" cols="50" rows="10"></textarea>
                </label></th>
        </tr>
        <tr>
            <th><label for="interesse">Matéria de interesse</label><br>
                <input type="checkbox" name="backend" value="Backend">Back End<br>
                <input type="checkbox" name="backend" value="Frontend">Front End<br>
                <input type="checkbox" name="backend" value="Fullstack">Full Stack
            </th>
            <th>
                <label for="interesse">Tipo de Viagem</label><br>
                <input type="radio" name="negocios" value="Backend">Négocios<br>
                <input type="radio" name="lazer" value="Frontend">Lazer<br>
                <input type="radio" name="turismo" value="Fullstack">Turismo<br>
                <input type="radio" name="academico" value="Fullstack">Academico
            </th>
            </th>
        </tr>
        <tr>
            <th>
                <label for="esporte">Esporte Favorito</label>
                <select name="esporte" size="4" multiple>
                    <option value="Futebol">Futebol</option>
                    <option value="basquete">Basquete</option>
                    <option value="volei">Volei</option>
                    <option value="tenis">Tênis</option>
                </select>

            </th>
            <th>
                <label for="investimento">Esporte Favorito</label>
                <select name="investimento" size="1">
                    <option value="poupanca">Poupança</option>
                    <option value="cdb">CDB</option>
                    <option value="Tesouro">Tesouro Direto</option>
                    <option value="fundos">Fundos Imobiliarios</option>
                    <option value="cdi">CDI</option>
                    <option value="debentures">Debêntures</option>
                    <option value="criptomoedas">Criptomoedas</option>
                    <option value="acoes">Ações</option>
                </select>
            </th>
        </tr>
        <tr>
            <td>Escolha uma cor:
                <input type="color" name="cor" value="#000000">
            </td>

            <td>Selecione um arquivo:
                <input type="file" name="arquivo">
            </td>
        </tr>

        <tr>
            <td>Data e Hora envio:
                <input type="datetime-local" name="datahora">
            </td>
        </tr>

        <tr>
            <td><input type="submit" value="Enviar"></td>
            <td><input type="reset" value="Limpar"></td>

        </tr>
    </table>
</Form>
</body>

</html>
